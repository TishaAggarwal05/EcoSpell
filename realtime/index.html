<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Speech Assessment</title>
</head>
<body>
    <h2>Read this text aloud:</h2>
    <p id="referenceText">The quick brown fox jumps over the lazy dog.</p>

    <button id="startBtn">Start Recording</button>
    <button id="stopBtn" disabled>Stop Recording</button>

    <h3>Recognized Text:</h3>
    <p id="recognizedText"></p>

    <h3>Assessment Scores:</h3>
    <p id="scores"></p>

    <!-- loads the Microsoft Cognitive Services Speech SDK for JavaScript from the provided URL -->
    <script src="https://aka.ms/csspeech/jsbrowserpackageraw"></script>
    <script src="script.js"></script>
</body>
</html>
